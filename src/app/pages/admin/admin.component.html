<div class="page">
  <div class="page-header">
    <h1 class="page-title">Amministrazione</h1>
  </div>

  <div class="grid grid-2">
    <mat-card>
      <div class="card-header">Utenti</div>
      <div class="card-body">
        <table mat-table [dataSource]="users" class="admin-table">
          <ng-container matColumnDef="username">
            <th mat-header-cell *matHeaderCellDef>Username</th>
            <td mat-cell *matCellDef="let row">{{ row.username }}</td>
          </ng-container>

          <ng-container matColumnDef="email">
            <th mat-header-cell *matHeaderCellDef>Email</th>
            <td mat-cell *matCellDef="let row">{{ row.email }}</td>
          </ng-container>

          <ng-container matColumnDef="attivo">
            <th mat-header-cell *matHeaderCellDef>Attivo</th>
            <td mat-cell *matCellDef="let row">
              <mat-slide-toggle [checked]="row.attivo" (change)="toggleUser(row)"></mat-slide-toggle>
            </td>
          </ng-container>

          <ng-container matColumnDef="actions">
            <th mat-header-cell *matHeaderCellDef>Azioni</th>
            <td mat-cell *matCellDef="let row">
              <button mat-stroked-button color="primary" (click)="toggleUser(row)">
                {{ row.attivo ? 'Disattiva' : 'Attiva' }}
              </button>
            </td>
          </ng-container>

          <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
          <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
        </table>
      </div>
    </mat-card>

    <div class="grid" style="gap: 18px;">
      <mat-card>
        <div class="card-header">Gestione team</div>
        <div class="card-body">
          <div class="form-grid">
            <mat-form-field appearance="outline">
              <mat-label>Nome team</mat-label>
              <input matInput [(ngModel)]="teamName">
            </mat-form-field>
            <mat-form-field appearance="outline">
              <mat-label>Country</mat-label>
              <input matInput [(ngModel)]="teamCountry" maxlength="2">
            </mat-form-field>
            <mat-form-field appearance="outline">
              <mat-label>Manager username</mat-label>
              <input matInput [(ngModel)]="teamManager">
            </mat-form-field>
            <button mat-raised-button color="primary" (click)="saveTeam()">Salva team</button>
          </div>
        </div>
      </mat-card>

      <mat-card>
        <div class="card-header">Assegna membro</div>
        <div class="card-body">
          <div class="form-grid">
            <mat-form-field appearance="outline">
              <mat-label>Team</mat-label>
              <input matInput [(ngModel)]="memberTeam">
            </mat-form-field>
            <mat-form-field appearance="outline">
              <mat-label>Username</mat-label>
              <input matInput [(ngModel)]="memberUsername">
            </mat-form-field>
            <button mat-stroked-button color="primary" (click)="assignMember()">Assegna</button>
          </div>
        </div>
      </mat-card>

      <mat-card>
        <div class="card-header">Rimuovi membro</div>
        <div class="card-body">
          <div class="form-grid">
            <mat-form-field appearance="outline">
              <mat-label>Username</mat-label>
              <input matInput [(ngModel)]="removeUsername">
            </mat-form-field>
            <button mat-stroked-button color="warn" (click)="unassignMember()">Rimuovi</button>
          </div>
        </div>
      </mat-card>
    </div>
  </div>
</div>
