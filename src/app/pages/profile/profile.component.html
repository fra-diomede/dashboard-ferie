<div class="page">
  <div class="page-header">
    <h1 class="page-title">Profilo</h1>
  </div>

  <div class="grid grid-2">
    <mat-card>
      <div class="card-header">Informazioni account</div>
      <div class="card-body">
        <div class="info-row">
          <span>Username</span>
          <strong>{{ session?.username }}</strong>
        </div>
        <div class="info-row">
          <span>Ruoli</span>
          <strong>{{ session?.ruoli?.join(', ') }}</strong>
        </div>
      </div>
    </mat-card>

    <mat-card>
      <div class="card-header">Cambia password</div>
      <div class="card-body">
        <form [formGroup]="changeForm" (ngSubmit)="changePassword()" class="form-grid">
          <mat-form-field appearance="outline">
            <mat-label>Password attuale</mat-label>
            <input matInput type="password" formControlName="currentPassword">
          </mat-form-field>
          <mat-form-field appearance="outline">
            <mat-label>Nuova password</mat-label>
            <input matInput type="password" formControlName="newPassword">
          </mat-form-field>
          <mat-form-field appearance="outline">
            <mat-label>Conferma nuova password</mat-label>
            <input matInput type="password" formControlName="confirmNewPassword">
          </mat-form-field>
          <button mat-raised-button color="primary" type="submit" [disabled]="changeForm.invalid">
            Aggiorna password
          </button>
        </form>
      </div>
    </mat-card>
  </div>

  <mat-card style="margin-top: 18px;">
    <div class="card-header">Elimina account</div>
    <div class="card-body">
      <div class="delete-grid">
        <mat-form-field appearance="outline">
          <mat-label>Password di conferma</mat-label>
          <input matInput type="password" [(ngModel)]="deletePassword">
        </mat-form-field>
        <button mat-stroked-button color="warn" (click)="deleteAccount()">Elimina account</button>
      </div>
    </div>
  </mat-card>
</div>
