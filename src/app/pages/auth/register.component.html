<div class="auth-shell">
  <div class="auth-panel">
    <div class="brand">Timeoffly</div>
    <mat-card>
      <mat-card-title>Crea il tuo account</mat-card-title>
      <mat-card-subtitle>Inizia a gestire le ferie con precisione.</mat-card-subtitle>

      <form [formGroup]="form" (ngSubmit)="submit()">
        <mat-form-field appearance="outline">
          <mat-label>Username</mat-label>
          <input matInput formControlName="username" autocomplete="username">
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>Email</mat-label>
          <input matInput formControlName="email" autocomplete="email">
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>Password</mat-label>
          <input matInput type="password" formControlName="password" autocomplete="new-password">
        </mat-form-field>

        <button mat-raised-button color="primary" type="submit" [disabled]="form.invalid || loading">
          {{ loading ? 'Registrazione...' : 'Registrati' }}
        </button>
      </form>

      <div class="auth-footer">
        <span>Hai già un account?</span>
        <a routerLink="/auth/login">Accedi</a>
      </div>
    </mat-card>
  </div>

  <div class="auth-aside">
    <div class="aside-card">
      <h2>Insight immediati per HR e manager</h2>
      <p>Dashboard complete, notifiche di approvazione e report mensili per ogni team.</p>
      <div class="aside-grid">
        <div>
          <div class="kpi-value">24/7</div>
          <div class="kpi-label">Monitoraggio</div>
        </div>
        <div>
          <div class="kpi-value">+12</div>
          <div class="kpi-label">Report KPI</div>
        </div>
      </div>
    </div>
  </div>
</div>
