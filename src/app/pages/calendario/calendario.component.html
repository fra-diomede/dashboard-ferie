<div class="page">
  <div class="page-header">
    <h1 class="page-title">Calendario annuale</h1>
    <div class="filters">
      <mat-form-field appearance="outline">
        <mat-label>Anno</mat-label>
        <input matInput type="number" [(ngModel)]="year">
      </mat-form-field>
      <mat-form-field appearance="outline">
        <mat-label>Country</mat-label>
        <input matInput [(ngModel)]="country" maxlength="2">
      </mat-form-field>
      <button mat-raised-button color="primary" (click)="load()">Carica</button>
    </div>
  </div>

  <mat-card>
    <div class="card-header">Festivi e calendario</div>
    <div class="card-body">
      <table mat-table [dataSource]="calendario" class="calendar-table">
        <ng-container matColumnDef="data">
          <th mat-header-cell *matHeaderCellDef>Data</th>
          <td mat-cell *matCellDef="let row">{{ row.data }}</td>
        </ng-container>

        <ng-container matColumnDef="giorno">
          <th mat-header-cell *matHeaderCellDef>Giorno</th>
          <td mat-cell *matCellDef="let row">{{ row.giornoSettimana }}</td>
        </ng-container>

        <ng-container matColumnDef="festivo">
          <th mat-header-cell *matHeaderCellDef>Festivo</th>
          <td mat-cell *matCellDef="let row">
            <span class="tag" *ngIf="row.officialFestivo">Ufficiale</span>
            <span *ngIf="!row.officialFestivo">-</span>
          </td>
        </ng-container>

        <ng-container matColumnDef="tipo">
          <th mat-header-cell *matHeaderCellDef>Descrizione</th>
          <td mat-cell *matCellDef="let row">
            {{ row.festivo?.localName || row.festivo?.name || '-' }}
          </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
      </table>
    </div>
  </mat-card>
</div>
