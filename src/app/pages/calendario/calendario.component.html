<div class="page">
  <div class="page-header">
    <div class="page-title-group">
      <h1 class="page-title">Calendario annuale</h1>
      <div class="page-subtitle">Festivi e panoramica per mese</div>
    </div>
    <div class="filters">
      <mat-form-field appearance="outline">
        <mat-label>Anno</mat-label>
        <input matInput type="number" [(ngModel)]="year">
      </mat-form-field>
      <mat-form-field appearance="outline">
        <mat-label>Country</mat-label>
        <input matInput [(ngModel)]="country" maxlength="2">
      </mat-form-field>
      <button mat-raised-button color="primary" (click)="load()">Carica</button>
    </div>
  </div>

  <div class="month-grid">
    <mat-card class="month-card" *ngFor="let month of months">
      <div class="month-header">
        <div>
          <div class="month-title">{{ month.monthName }}</div>
          <div class="month-year">{{ month.year }}</div>
        </div>
        <div class="month-meta">
          <span class="pill" [class.muted]="!month.holidayCount">{{ month.holidayCount }} festivi</span>
        </div>
      </div>

      <div class="weekday-row">
        <span>Lun</span>
        <span>Mar</span>
        <span>Mer</span>
        <span>Gio</span>
        <span>Ven</span>
        <span>Sab</span>
        <span>Dom</span>
      </div>

      <div class="weeks">
        <div class="week" *ngFor="let week of month.weeks">
          <div
            class="day"
            *ngFor="let day of week"
            [ngClass]="{
              empty: !day,
              weekend: day?.isWeekend,
              holiday: day?.isHoliday,
              official: day?.isOfficial
            }"
            [attr.title]="day?.label || null">
            {{ day?.day || '' }}
          </div>
        </div>
      </div>

      <div class="holiday-list" *ngIf="month.holidays.length; else noHoliday">
        <div class="holiday-item" *ngFor="let item of month.holidays">
          <span class="holiday-date">{{ item.dateLabel }}</span>
          <span class="holiday-name">{{ item.label || 'Festivo' }}</span>
        </div>
      </div>
      <ng-template #noHoliday>
        <div class="holiday-empty">Nessun festivo nel mese.</div>
      </ng-template>
    </mat-card>
  </div>
</div>
